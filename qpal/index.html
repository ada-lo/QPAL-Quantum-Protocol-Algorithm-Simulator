<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QPAL — Quantum Protocol & Algorithm Simulator</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  /* ─── CSS Variables ─── */
  :root {
    --bg: #050810;
    --bg2: #0b0f1a;
    --bg3: #111827;
    --border: #1e2d45;
    --border2: #2a3f5f;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --accent3: #10b981;
    --warn: #f59e0b;
    --danger: #ef4444;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #475569;
    --glow: 0 0 20px rgba(0, 212, 255, 0.15);
    --glow2: 0 0 20px rgba(124, 58, 237, 0.2);
    --font-mono: 'Space Mono', monospace;
    --font-ui: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ─── Header ─── */
  .header {
    position: relative;
    z-index: 10;
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(5,8,16,0.9);
    backdrop-filter: blur(12px);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 34px;
    height: 34px;
    border: 1.5px solid var(--accent);
    border-radius: 8px;
    display: grid;
    place-items: center;
    font-size: 16px;
    box-shadow: var(--glow);
    animation: pulse-logo 3s ease-in-out infinite;
  }

  @keyframes pulse-logo {
    0%, 100% { box-shadow: 0 0 10px rgba(0,212,255,0.2); }
    50% { box-shadow: 0 0 25px rgba(0,212,255,0.5); }
  }

  .logo-text {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 0.06em;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .logo-sub {
    font-size: 10px;
    color: var(--text3);
    font-family: var(--font-mono);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-left: 44px;
    margin-top: -4px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent3);
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .status-text {
    font-size: 11px;
    color: var(--text3);
    font-family: var(--font-mono);
  }

  /* ─── Layout ─── */
  .app-layout {
    display: grid;
    grid-template-columns: 320px 1fr;
    grid-template-rows: auto 1fr;
    height: calc(100vh - 61px);
    position: relative;
    z-index: 1;
  }

  /* ─── Left Panel ─── */
  .left-panel {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: rgba(11,15,26,0.7);
  }

  /* ─── Mode Selector ─── */
  .mode-selector {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }

  .mode-label {
    font-size: 10px;
    color: var(--text3);
    font-family: var(--font-mono);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .mode-tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .mode-tab {
    padding: 10px 8px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-family: var(--font-ui);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    letter-spacing: 0.03em;
  }

  .mode-tab:hover {
    border-color: var(--border2);
    color: var(--text);
  }

  .mode-tab.active {
    background: linear-gradient(135deg, rgba(0,212,255,0.12), rgba(124,58,237,0.12));
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 12px rgba(0,212,255,0.1);
  }

  .mode-tab .tab-icon { font-size: 14px; display: block; margin-bottom: 2px; }

  /* ─── Presets ─── */
  .presets-section {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }

  .section-label {
    font-size: 10px;
    color: var(--text3);
    font-family: var(--font-mono);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .preset-btn {
    width: 100%;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }

  .preset-btn:hover {
    border-color: var(--accent);
    background: rgba(0,212,255,0.05);
  }

  .preset-btn.active {
    border-color: var(--accent2);
    background: rgba(124,58,237,0.1);
    color: #a78bfa;
  }

  .preset-icon {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    background: rgba(0,212,255,0.1);
    display: grid;
    place-items: center;
    font-size: 12px;
    flex-shrink: 0;
  }

  /* ─── Code Editor ─── */
  .editor-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 16px;
    gap: 10px;
  }

  .editor-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .code-editor {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    color: var(--accent3);
    font-family: var(--font-mono);
    font-size: 11px;
    line-height: 1.7;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    overflow-y: auto;
  }

  .code-editor:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(0,212,255,0.08);
  }

  /* ─── Control Buttons ─── */
  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
  }

  .btn {
    padding: 9px 6px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    letter-spacing: 0.04em;
  }

  .btn:hover:not(:disabled) {
    border-color: var(--border2);
    background: rgba(255,255,255,0.05);
    transform: translateY(-1px);
  }

  .btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  .btn-run {
    border-color: var(--accent3);
    color: var(--accent3);
  }
  .btn-run:hover:not(:disabled) {
    background: rgba(16,185,129,0.1);
    box-shadow: 0 0 12px rgba(16,185,129,0.2);
  }

  .btn-step {
    border-color: var(--accent);
    color: var(--accent);
  }
  .btn-step:hover:not(:disabled) {
    background: rgba(0,212,255,0.08);
    box-shadow: 0 0 12px rgba(0,212,255,0.15);
  }

  .btn-reset {
    border-color: var(--danger);
    color: var(--danger);
  }
  .btn-reset:hover:not(:disabled) {
    background: rgba(239,68,68,0.08);
  }

  /* ─── Right Panel ─── */
  .right-panel {
    display: grid;
    grid-template-rows: 1fr 1fr;
    overflow: hidden;
  }

  /* ─── Visualization Panel ─── */
  .viz-panel {
    border-bottom: 1px solid var(--border);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .panel-header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(11,15,26,0.5);
  }

  .panel-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text2);
  }

  .panel-badge {
    font-size: 10px;
    font-family: var(--font-mono);
    padding: 2px 8px;
    border-radius: 20px;
    background: rgba(0,212,255,0.1);
    border: 1px solid rgba(0,212,255,0.2);
    color: var(--accent);
  }

  .viz-content {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }

  /* ─── Circuit Visualization ─── */
  .circuit-viz {
    font-family: var(--font-mono);
    font-size: 11px;
  }

  .circuit-row {
    display: flex;
    align-items: center;
    gap: 0;
    margin-bottom: 12px;
    position: relative;
  }

  .circuit-wire {
    display: flex;
    align-items: center;
    gap: 0;
    flex: 1;
  }

  .qubit-label {
    width: 32px;
    color: var(--accent);
    font-weight: 700;
    flex-shrink: 0;
  }

  .wire-line {
    height: 2px;
    background: linear-gradient(90deg, var(--border), var(--border2));
    flex: 1;
    position: relative;
  }

  .gate-box {
    width: 36px;
    height: 28px;
    border: 1.5px solid;
    border-radius: 6px;
    display: grid;
    place-items: center;
    font-size: 10px;
    font-weight: 700;
    flex-shrink: 0;
    position: relative;
    transition: all 0.3s;
    z-index: 2;
    background: var(--bg2);
  }

  .gate-H { border-color: var(--accent); color: var(--accent); }
  .gate-X { border-color: var(--warn); color: var(--warn); }
  .gate-CNOT { border-color: var(--accent2); color: var(--accent2); }
  .gate-MEASURE { border-color: var(--accent3); color: var(--accent3); }
  .gate-INIT { border-color: var(--text3); color: var(--text3); }

  .gate-box.active {
    box-shadow: 0 0 16px currentColor;
    transform: scale(1.1);
  }

  /* ─── Protocol Flow ─── */
  .protocol-flow {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .protocol-actors {
    display: flex;
    justify-content: space-between;
    padding: 0 16px;
  }

  .actor-node {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .actor-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 2px solid;
    display: grid;
    place-items: center;
    font-size: 20px;
    background: var(--bg3);
    transition: all 0.3s;
  }

  .actor-Alice { border-color: var(--accent3); }
  .actor-Bob { border-color: var(--accent); }
  .actor-Eve { border-color: var(--danger); }

  .actor-avatar.active {
    box-shadow: 0 0 20px currentColor;
    transform: scale(1.1);
  }

  .actor-name {
    font-size: 11px;
    font-weight: 700;
    font-family: var(--font-mono);
    letter-spacing: 0.06em;
  }

  .channel-area {
    position: relative;
    margin: 8px 0;
    height: 40px;
  }

  .channel-line {
    position: absolute;
    left: 80px;
    right: 80px;
    top: 50%;
    height: 2px;
    background: linear-gradient(90deg, var(--accent3), var(--accent), var(--accent));
    transform: translateY(-50%);
  }

  .channel-label {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    background: var(--bg);
    padding: 2px 8px;
    font-size: 9px;
    font-family: var(--font-mono);
    color: var(--text3);
    border: 1px solid var(--border);
    border-radius: 4px;
    white-space: nowrap;
  }

  .qubit-packet {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid var(--accent);
    display: grid;
    place-items: center;
    font-size: 9px;
    font-weight: 700;
    color: var(--bg);
    transition: left 0.8s ease;
  }

  .qubit-packet.intercepted {
    background: var(--danger);
    border-color: var(--danger);
  }

  /* ─── State Display ─── */
  .state-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
  }

  .qubit-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    transition: all 0.3s;
  }

  .qubit-card.active {
    border-color: var(--accent);
    box-shadow: 0 0 14px rgba(0,212,255,0.12);
  }

  .qubit-card.measured {
    border-color: var(--accent3);
    background: rgba(16,185,129,0.06);
  }

  .qubit-card.entangled {
    border-color: var(--accent2);
    background: rgba(124,58,237,0.06);
  }

  .qubit-name {
    font-size: 10px;
    font-family: var(--font-mono);
    color: var(--text3);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .qubit-state-display {
    font-size: 22px;
    font-family: var(--font-mono);
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .qubit-meta {
    font-size: 9px;
    font-family: var(--font-mono);
    color: var(--text3);
    line-height: 1.5;
  }

  .qubit-tag {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 8px;
    font-weight: 700;
    margin-top: 4px;
    letter-spacing: 0.05em;
  }

  .tag-super { background: rgba(0,212,255,0.15); color: var(--accent); }
  .tag-entangled { background: rgba(124,58,237,0.15); color: #a78bfa; }
  .tag-measured { background: rgba(16,185,129,0.15); color: var(--accent3); }

  /* ─── Output Panel ─── */
  .output-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .output-content {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    font-family: var(--font-mono);
    font-size: 11px;
    line-height: 1.8;
  }

  .log-line {
    display: flex;
    gap: 10px;
    padding: 3px 0;
    border-bottom: 1px solid rgba(255,255,255,0.02);
    transition: background 0.2s;
  }

  .log-line.active-line {
    background: rgba(0,212,255,0.05);
    border-radius: 4px;
    padding: 3px 6px;
  }

  .log-num {
    color: var(--text3);
    width: 20px;
    flex-shrink: 0;
    user-select: none;
  }

  .log-text { color: var(--text2); }
  .log-text.warn { color: var(--warn); }
  .log-text.error { color: var(--danger); }
  .log-text.success { color: var(--accent3); }
  .log-text.info { color: var(--accent); }
  .log-text.intercept { color: var(--danger); }

  /* ─── Progress ─── */
  .progress-bar {
    height: 3px;
    background: var(--border);
    position: relative;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.3s ease;
    box-shadow: 0 0 8px var(--accent);
  }

  /* ─── BB84 Statistics ─── */
  .bb84-stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-top: 12px;
  }

  .stat-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    text-align: center;
  }

  .stat-value {
    font-size: 24px;
    font-weight: 800;
    font-family: var(--font-mono);
    margin-bottom: 4px;
  }

  .stat-label {
    font-size: 9px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .stat-danger .stat-value { color: var(--danger); }
  .stat-success .stat-value { color: var(--accent3); }
  .stat-info .stat-value { color: var(--accent); }
  .stat-warn .stat-value { color: var(--warn); }

  /* ─── BB84 Table ─── */
  .bb84-table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--font-mono);
    font-size: 10px;
    margin-top: 12px;
  }

  .bb84-table th {
    padding: 6px 8px;
    text-align: center;
    color: var(--text3);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    border-bottom: 1px solid var(--border);
  }

  .bb84-table td {
    padding: 5px 8px;
    text-align: center;
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }

  .bb84-table tr.match td { background: rgba(16,185,129,0.06); }
  .bb84-table tr.error-row td { background: rgba(239,68,68,0.08); }

  .basis-Z { color: var(--accent); }
  .basis-X { color: var(--accent2); }

  .eve-col { color: var(--danger); font-size: 9px; }

  /* ─── Empty state ─── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--text3);
  }

  .empty-icon { font-size: 48px; opacity: 0.4; }
  .empty-text { font-size: 12px; font-family: var(--font-mono); }

  /* ─── Scrollbar ─── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* ─── Eve Toggle ─── */
  .eve-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 8px;
  }

  .toggle-switch {
    width: 36px;
    height: 18px;
    border-radius: 9px;
    background: var(--border);
    position: relative;
    cursor: pointer;
    transition: background 0.2s;
    flex-shrink: 0;
  }

  .toggle-switch.on { background: var(--danger); }

  .toggle-knob {
    position: absolute;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: white;
    top: 2px;
    left: 2px;
    transition: left 0.2s;
  }

  .toggle-switch.on .toggle-knob { left: 20px; }

  .toggle-label { font-size: 11px; font-weight: 600; }
  .toggle-desc { font-size: 10px; color: var(--text3); }

  /* ─── Alerts ─── */
  .alert {
    padding: 10px 14px;
    border-radius: 8px;
    margin-bottom: 12px;
    font-size: 11px;
    font-family: var(--font-mono);
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }

  .alert-danger { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
  .alert-success { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: #6ee7b7; }
  .alert-info { background: rgba(0,212,255,0.08); border: 1px solid rgba(0,212,255,0.2); color: #7dd3fc; }

  /* ─── Channel messages ─── */
  .channel-msgs {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 12px;
  }

  .channel-msg {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 10px;
    font-family: var(--font-mono);
  }

  .channel-msg.intercepted { border-color: rgba(239,68,68,0.4); background: rgba(239,68,68,0.05); }
  .msg-arrow { color: var(--text3); }

  .tabs-row {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
  }

  .tab-btn {
    padding: 8px 16px;
    font-size: 10px;
    font-weight: 700;
    font-family: var(--font-mono);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--text3);

<script>
// ═══════════════════════════════════════════════
// PARSER
// ═══════════════════════════════════════════════
const VALID_COMMANDS = new Set(['INIT','H','X','CNOT','MEASURE','ACTOR','ASSIGN','SEND','INTERCEPT']);

function parseLine(line, lineNumber) {
  const trimmed = line.trim();
  if (!trimmed) return null;
  if (trimmed.startsWith('#') || trimmed.startsWith('//')) {
    return { type: 'COMMENT', text: trimmed.slice(1).trim(), lineNumber };
  }
  const tokens = trimmed.split(/\s+/);
  const command = tokens[0].toUpperCase();
  if (!VALID_COMMANDS.has(command)) {
    return { type: 'ERROR', lineNumber, raw: trimmed, message: `Unknown command: "${tokens[0]}"` };
  }
  switch (command) {
    case 'INIT':
      if (tokens.length < 2) return { type:'ERROR', lineNumber, raw:trimmed, message:'INIT requires qubit name' };
      return { type:'INIT', qubit:tokens[1].toLowerCase(), lineNumber, raw:trimmed };
    case 'H':
      if (tokens.length < 2) return { type:'ERROR', lineNumber, raw:trimmed, message:'H requires qubit name' };
      return { type:'H', qubit:tokens[1].toLowerCase(), lineNumber, raw:trimmed };
    case 'X':
      if (tokens.length < 2) return { type:'ERROR', lineNumber, raw:trimmed, message:'X requires qubit name' };
      return { type:'X', qubit:tokens[1].toLowerCase(), lineNumber, raw:trimmed };
    case 'CNOT':
      if (tokens.length < 3) return { type:'ERROR', lineNumber, raw:trimmed, message:'CNOT requires control and target' };
      return { type:'CNOT', control:tokens[1].toLowerCase(), target:tokens[2].toLowerCase(), lineNumber, raw:trimmed };
    case 'MEASURE': {
      if (tokens.length < 2) return { type:'ERROR', lineNumber, raw:trimmed, message:'MEASURE requires qubit name' };
      let basis = 'Z';
      if (tokens.length >= 4 && tokens[2].toUpperCase() === 'BASIS') {
        const b = tokens[3].toUpperCase();
        if (b !== 'X' && b !== 'Z') return { type:'ERROR', lineNumber, raw:trimmed, message:'BASIS must be X or Z' };
        basis = b;
      }
      return { type:'MEASURE', qubit:tokens[1].toLowerCase(), basis, lineNumber, raw:trimmed };
    }
    case 'ACTOR':
      if (tokens.length < 2) return { type:'ERROR', lineNumber, raw:trimmed, message:'ACTOR requires a name' };
      return { type:'ACTOR', name:tokens[1], lineNumber, raw:trimmed };
    case 'ASSIGN':
      if (tokens.length < 3) return { type:'ERROR', lineNumber, raw:trimmed, message:'ASSIGN requires qubit and actor' };
      return { type:'ASSIGN', qubit:tokens[1].toLowerCase(), actor:tokens[2], lineNumber, raw:trimmed };
    case 'SEND':
      if (tokens.length < 4) return { type:'ERROR', lineNumber, raw:trimmed, message:'SEND requires qubit, from, to' };
      return { type:'SEND', qubit:tokens[1].toLowerCase(), from:tokens[2], to:tokens[3], lineNumber, raw:trimmed };
    case 'INTERCEPT':
      if (tokens.length < 3) return { type:'ERROR', lineNumber, raw:trimmed, message:'INTERCEPT requires qubit and interceptor' };
      return { type:'INTERCEPT', qubit:tokens[1].toLowerCase(), interceptor:tokens[2], lineNumber, raw:trimmed };
    default:
      return { type:'ERROR', lineNumber, raw:trimmed, message:`Unhandled: ${command}` };
  }
}

function parseProgram(code) {
  const lines = code.split('\n');
  const instructions = [], errors = [];
  lines.forEach((line, idx) => {
    const inst = parseLine(line, idx + 1);
    if (!inst) return;
    if (inst.type === 'ERROR') errors.push(inst);
    instructions.push(inst);
  });
  return { instructions, errors, valid: errors.length === 0 };
}

// ═══════════════════════════════════════════════
// ENGINE
// ═══════════════════════════════════════════════
function createQubit(name) {
  return { name, value:0, superposition:false, entangledWith:null, owner:null, measured:false, basis:null };
}

class QuantumEngine {
  constructor() { this.reset(); }
  reset() {
    this.qubits = {}; this.actors = {}; this.measurements = {};
    this.stepLog = []; this.channel = [];
  }
  getState() {
    return { qubits:{...this.qubits}, actors:{...this.actors},
             measurements:{...this.measurements}, stepLog:[...this.stepLog], channel:[...this.channel] };
  }
  executeInstruction(inst) {
    const { type } = inst;
    let log = '', effect = null;
    switch (type) {
      case 'COMMENT': log = `# ${inst.text}`; break;
      case 'INIT':
        this.qubits[inst.qubit] = createQubit(inst.qubit);
        log = `INIT ${inst.qubit} → |0⟩`;
        effect = { kind:'qubit_created', qubit:inst.qubit }; break;
      case 'H': {
        if (!this.qubits[inst.qubit]) { log = `⚠️ H: qubit "${inst.qubit}" not initialized`; break; }
        const q = this.qubits[inst.qubit];
        if (q.measured) { log = `⚠️ Cannot apply H to measured qubit`; break; }
        if (q.superposition) {
          this.qubits[inst.qubit] = { ...q, superposition:false };
          log = `H(${inst.qubit}): superposition collapsed → |${q.value}⟩`;
        } else {
          this.qubits[inst.qubit] = { ...q, superposition:true };
          log = `H(${inst.qubit}): |${q.value}⟩ → |+⟩ (superposition)`;
        }
        effect = { kind:'gate_applied', gate:'H', qubit:inst.qubit }; break;
      }
      case 'X': {
        if (!this.qubits[inst.qubit]) { log = `⚠️ X: qubit "${inst.qubit}" not initialized`; break; }
        const q = this.qubits[inst.qubit];
        const nv = q.value === 0 ? 1 : 0;
        this.qubits[inst.qubit] = { ...q, value:nv };
        log = `X(${inst.qubit}): flipped → |${nv}⟩`;
        effect = { kind:'gate_applied', gate:'X', qubit:inst.qubit }; break;
      }
      case 'CNOT': {
        const { control, target } = inst;
        if (!this.qubits[control]||!this.qubits[target]) {
          log = `⚠️ CNOT: qubits not initialized`; break;
        }
        const cq = this.qubits[control], tq = this.qubits[target];
        let nv = tq.value;
        if (!cq.superposition && cq.value === 1) nv = tq.value === 0 ? 1 : 0;
        this.qubits[control] = { ...cq, entangledWith:target };
        this.qubits[target] = { ...tq, value:nv, superposition:cq.superposition, entangledWith:control };
        log = `CNOT: ${control} ⊕ ${target} → |${cq.superposition?'?':cq.value}${nv}⟩ (entangled)`;
        effect = { kind:'entangled', control, target }; break;
      }
      case 'MEASURE': {
        if (!this.qubits[inst.qubit]) { log = `⚠️ MEASURE: qubit not initialized`; break; }
        const q = this.qubits[inst.qubit];
        let result;
        if (q.superposition) {
          result = Math.random() < 0.5 ? 0 : 1;
          log = `MEASURE(${inst.qubit}) ${inst.basis} basis: superposition → |${result}⟩ (random)`;
        } else if (inst.basis === 'X' && !q.superposition) {
          result = Math.random() < 0.5 ? 0 : 1;
          log = `MEASURE(${inst.qubit}) X basis: Z-eigenstate → |${result}⟩ (incompatible, random)`;
        } else {
          result = q.value;
          log = `MEASURE(${inst.qubit}) ${inst.basis} basis: → |${result}⟩`;
        }
        this.qubits[inst.qubit] = { ...q, value:result, superposition:false, measured:true, basis:inst.basis };
        this.measurements[inst.qubit] = result;
        // collapse entangled partner
        const partner = q.entangledWith;
        if (partner && this.qubits[partner] && !this.qubits[partner].measured) {
          this.qubits[partner] = { ...this.qubits[partner], value:result, superposition:false };
          log += ` | Entangled ${partner} → |${result}⟩`;
        }
        effect = { kind:'measured', qubit:inst.qubit, result, basis:inst.basis }; break;
      }
      case 'ACTOR':
        this.actors[inst.name] = { name:inst.name, qubits:[] };
        log = `ACTOR ${inst.name} registered`;
        effect = { kind:'actor_created', actor:inst.name }; break;
      case 'ASSIGN': {
        if (!this.qubits[inst.qubit]) { log = `⚠️ ASSIGN: qubit not initialized`; break; }
        if (!this.actors[inst.actor]) this.actors[inst.actor] = { name:inst.actor, qubits:[] };
        this.qubits[inst.qubit] = { ...this.qubits[inst.qubit], owner:inst.actor };
        if (!this.actors[inst.actor].qubits.includes(inst.qubit))
          this.actors[inst.actor].qubits.push(inst.qubit);
        log = `ASSIGN ${inst.qubit} → ${inst.actor}`;
        effect = { kind:'assigned', qubit:inst.qubit, actor:inst.actor }; break;
      }
      case 'SEND': {
        if (!this.qubits[inst.qubit]) { log = `⚠️ SEND: qubit not initialized`; break; }
        const qv = this.qubits[inst.qubit];
        this.qubits[inst.qubit] = { ...qv, owner:inst.to };
        this.channel.push({ from:inst.from, to:inst.to, qubit:inst.qubit, intercepted:false, step:this.stepLog.length });
        log = `📡 SEND ${inst.qubit}: ${inst.from} → ${inst.to} [${qv.superposition?'|+⟩':'|'+qv.value+'⟩'}]`;
        effect = { kind:'sent', qubit:inst.qubit, from:inst.from, to:inst.to }; break;
      }
      case 'INTERCEPT': {
        if (!this.qubits[inst.qubit]) { log = `⚠️ INTERCEPT: qubit not initialized`; break; }
        const eveBasis = Math.random() < 0.5 ? 'Z' : 'X';
        const q = this.qubits[inst.qubit];
        const result = q.superposition ? (Math.random()<0.5?0:1) : q.value;
        const rePrepared = createQubit(inst.qubit);
        rePrepared.value = result;
        rePrepared.owner = q.owner;
        this.qubits[inst.qubit] = rePrepared;
        this.channel.push({ from:inst.interceptor, to:'channel', qubit:inst.qubit, intercepted:true, step:this.stepLog.length });
        log = `🕵️ INTERCEPT by ${inst.interceptor}: measured ${inst.qubit} in ${eveBasis} basis → |${result}⟩ (re-prepared)`;
        effect = { kind:'intercepted', qubit:inst.qubit, interceptor:inst.interceptor }; break;
      }
      case 'ERROR':
        log = `❌ Parse Error (line ${inst.lineNumber}): ${inst.message}`; break;
      default:
        log = `⚠️ Unknown: ${type}`;
    }
    this.stepLog.push(log);
    return { instruction:inst, log, effect, stateAfter:this.getState() };
  }
}

// ═══════════════════════════════════════════════
// EXECUTION CONTROLLER
// ═══════════════════════════════════════════════
class ExecutionController {
  constructor() {
    this.engine = new QuantumEngine();
    this.instructions = []; this.currentStep = -1;
    this.history = []; this.stepResults = [];
  }
  load(instructions) {
    this.engine.reset();
    this.instructions = instructions.filter(i => i.type !== 'COMMENT');
    this.currentStep = -1; this.history = []; this.stepResults = [];
  }
  canStep() { return this.currentStep < this.instructions.length - 1; }
  isComplete() { return this.currentStep >= this.instructions.length - 1; }
  stepForward() {
    if (!this.canStep()) return null;
    this.currentStep++;
    const inst = this.instructions[this.currentStep];
    const result = this.engine.executeInstruction(inst);
    this.stepResults.push(result);
    return result;
  }
  runAll() {
    const results = [];
    while (this.canStep()) results.push(this.stepForward());
    return results;
  }
  reset() {
    this.engine.reset(); this.currentStep = -1;
    this.history = []; this.stepResults = [];
  }
  getProgress() {
    const total = this.instructions.length, done = this.currentStep + 1;
    return { total, done, percent: total === 0 ? 0 : Math.round((done/total)*100) };
  }
}

// ═══════════════════════════════════════════════
// PRESETS
// ═══════════════════════════════════════════════
const BELL_STATE_CODE = `# ══════════════════════════════════
# Bell State: |Φ+⟩ = (|00⟩ + |11⟩) / √2
# ══════════════════════════════════

# Initialize two qubits
INIT q0
INIT q1

# Hadamard on q0 → superposition
H q0

# CNOT entangles q0 and q1
CNOT q0 q1

# Measure both — they always agree
MEASURE q0 BASIS Z
MEASURE q1 BASIS Z`;

const BB84_CODE = `# ══════════════════════════════════
# BB84 Quantum Key Distribution
# Alice → [Eve?] → Bob
# ══════════════════════════════════

# Declare protocol actors
ACTOR Alice
ACTOR Bob
ACTOR Eve

# Alice prepares qubit in superposition
INIT q0
H q0
ASSIGN q0 Alice

# Alice prepares a |1⟩ qubit
INIT q1
X q1
ASSIGN q1 Alice

# Eve intercepts q0 (introduces error)
INTERCEPT q0 Eve

# Alice sends both to Bob
SEND q0 Alice Bob
SEND q1 Alice Bob

# Bob measures in different bases
MEASURE q0 BASIS Z
MEASURE q1 BASIS X

# Additional qubit without interception
INIT q2
H q2
ASSIGN q2 Alice
SEND q2 Alice Bob
MEASURE q2 BASIS Z`;

const CUSTOM_ALGO_CODE = `# Custom Algorithm
# Write your quantum circuit below

INIT q0
INIT q1
H q0
CNOT q0 q1
MEASURE q0 BASIS Z
MEASURE q1 BASIS Z`;

const CUSTOM_PROTO_CODE = `# Custom Protocol
# Declare actors and write protocol logic

ACTOR Alice
ACTOR Bob

INIT q0
H q0
ASSIGN q0 Alice
SEND q0 Alice Bob
MEASURE q0 BASIS Z`;

const ALGO_PRESETS = [
  { id:'bell', icon:'🔔', label:'Bell State', desc:'|Φ+⟩ entangled pair', code:BELL_STATE_CODE },
  { id:'custom-algo', icon:'✏️', label:'Custom Algorithm', desc:'Write your own', code:CUSTOM_ALGO_CODE },
];

const PROTO_PRESETS = [
  { id:'bb84', icon:'🔐', label:'BB84 Protocol', desc:'Quantum key distribution', code:BB84_CODE },
  { id:'custom-proto', icon:'✏️', label:'Custom Protocol', desc:'Write your own', code:CUSTOM_PROTO_CODE },
];

// ═══════════════════════════════════════════════
// APP STATE
// ═══════════════════════════════════════════════
let appMode = 'algorithm';
let activePreset = 'bell';
let vizTab = 'circuit';
let controller = new ExecutionController();
let allStepResults = [];
let currentStepIdx = -1;
let parsedInstructions = [];
let bb84SimData = null;
let eveActive = true;

// ═══════════════════════════════════════════════
// INIT APP
// ═══════════════════════════════════════════════
function initApp() {
  renderPresets();
  loadPreset('bell');
}

function setMode(mode) {
  appMode = mode;
  document.getElementById('tab-algo').classList.toggle('active', mode === 'algorithm');
  document.getElementById('tab-proto').classList.toggle('active', mode === 'protocol');
  renderPresets();
  const presets = mode === 'algorithm' ? ALGO_PRESETS : PROTO_PRESETS;
  loadPreset(presets[0].id);
}

function renderPresets() {
  const presets = appMode === 'algorithm' ? ALGO_PRESETS : PROTO_PRESETS;
  const container = document.getElementById('preset-list');
  container.innerHTML = presets.map(p => `
    <button class="preset-btn ${activePreset===p.id?'active':''}" onclick="loadPreset('${p.id}')">
      <span class="preset-icon">${p.icon}</span>
      <div>
        <div style="font-size:12px;font-weight:700">${p.label}</div>
        <div style="font-size:9px;color:var(--text3);margin-top:1px">${p.desc}</div>
      </div>
    </button>
  `).join('');
}

function loadPreset(id) {
  activePreset = id;
  const presets = appMode === 'algorithm' ? ALGO_PRESETS : PROTO_PRESETS;
  const preset = [...ALGO_PRESETS, ...PROTO_PRESETS].find(p => p.id === id);
  if (preset) document.getElementById('code-editor').value = preset.code;
  renderPresets();
  resetSim();
}

function setVizTab(tab) {
  vizTab = tab;
  ['circuit','state','protocol'].forEach(t => {
    document.getElementById(`vtab-${t}`).classList.toggle('active', t === tab);
  });
  renderViz();
}

// ═══════════════════════════════════════════════
// SIMULATION
// ═══════════════════════════════════════════════
function parseAndLoad() {
  const code = document.getElementById('code-editor').value;
  const { instructions, errors } = parseProgram(code);
  parsedInstructions = instructions;
  controller.load(instructions);
  allStepResults = [];
  currentStepIdx = -1;
  return { instructions, errors };
}

function runAll() {
  resetSim(false);
  const { errors } = parseAndLoad();
  if (errors.length > 0) {
    showParseErrors(errors); return;
  }
  // Special BB84 simulation
  if (activePreset === 'bb84') {
    runBB84Sim();
    return;
  }
  allStepResults = controller.runAll();
  currentStepIdx = allStepResults.length - 1;
  updateUI();
}

function stepOnce() {
  if (currentStepIdx === -1 && allStepResults.length === 0) {
    const { errors } = parseAndLoad();
    if (errors.length > 0) { showParseErrors(errors); return; }
  }
  if (!controller.canStep()) return;
  const result = controller.stepForward();
  allStepResults.push(result);
  currentStepIdx = allStepResults.length - 1;
  updateUI();
}

function resetSim(clearLog = true) {
  controller.reset();
  allStepResults = [];
  currentStepIdx = -1;
  parsedInstructions = [];
  bb84SimData = null;
  if (clearLog) {
    document.getElementById('output-content').innerHTML =
      '<div class="empty-state" style="height:100px"><div class="empty-text">Execution log will appear here...</div></div>';
  }
  document.getElementById('viz-content').innerHTML =
    '<div class="empty-state"><div class="empty-icon">⚛️</div><div class="empty-text">Load a preset or write code, then run.</div></div>';
  document.getElementById('step-badge').textContent = 'Step 0 / 0';
  document.getElementById('log-badge').textContent = '0 events';
  document.getElementById('progress-fill').style.width = '0%';
}

function showParseErrors(errors) {
  const container = document.getElementById('output-content');
  container.innerHTML = errors.map(e =>
    `<div class="log-line"><span class="log-num">${e.lineNumber}</span><span class="log-text error">❌ ${e.message} → "${e.raw}"</span></div>`
  ).join('');
}

function updateUI() {
  const prog = controller.getProgress();
  document.getElementById('step-badge').textContent = `Step ${prog.done} / ${prog.total}`;
  document.getElementById('progress-fill').style.width = prog.percent + '%';
  renderLog();
  renderViz();
  document.getElementById('btn-step').disabled = !controller.canStep();
}

// ═══════════════════════════════════════════════
// LOG RENDERING
// ═══════════════════════════════════════════════
function renderLog() {
  const container = document.getElementById('output-content');
  if (allStepResults.length === 0) return;
  const lines = allStepResults.map((r, i) => {
    const log = r.log;
    let cls = 'log-text';
    if (log.startsWith('⚠️')) cls += ' warn';
    else if (log.startsWith('❌')) cls += ' error';
    else if (log.startsWith('📡')) cls += ' info';
    else if (log.startsWith('🕵️')) cls += ' intercept';
    else if (log.startsWith('MEASURE') && r.effect) cls += ' success';
    const active = i === currentStepIdx ? 'active-line' : '';
    return `<div class="log-line ${active}">
      <span class="log-num">${i+1}</span>
      <span class="${cls}">${log}</span>
    </div>`;
  });
  container.innerHTML = lines.join('');
  document.getElementById('log-badge').textContent = `${allStepResults.length} events`;
  // Scroll to bottom
  container.scrollTop = container.scrollHeight;
}

// ═══════════════════════════════════════════════
// VISUALIZATION RENDERING
// ═══════════════════════════════════════════════
function renderViz() {
  if (bb84SimData) { renderBB84Viz(); return; }
  if (allStepResults.length === 0) return;

  const state = controller.engine.getState();
  const container = document.getElementById('viz-content');

  if (vizTab === 'circuit') renderCircuit(state, container);
  else if (vizTab === 'state') renderStatePanel(state, container);
  else if (vizTab === 'protocol') renderProtocolPanel(state, container);
}

function renderCircuit(state, container) {
  const qubits = Object.keys(state.qubits);
  if (qubits.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="empty-text">No qubits yet</div></div>';
    return;
  }

  // Build timeline of gates per qubit
  const gateTimeline = {}; // qubitName → [gate,...]
  qubits.forEach(q => { gateTimeline[q] = []; });

  allStepResults.forEach((r, idx) => {
    const { type } = r.instruction;
    const isActive = idx === currentStepIdx;
    if (type === 'H' || type === 'X' || type === 'MEASURE') {
      const q = r.instruction.qubit;
      if (gateTimeline[q]) gateTimeline[q].push({ gate:type, active:isActive, step:idx });
    }
    if (type === 'CNOT') {
      const { control, target } = r.instruction;
      if (gateTimeline[control]) gateTimeline[control].push({ gate:'CNOT-C', active:isActive, step:idx });
      if (gateTimeline[target]) gateTimeline[target].push({ gate:'CNOT-T', active:isActive, step:idx });
    }
    if (type === 'INIT') {
      const q = r.instruction.qubit;
      if (gateTimeline[q]) gateTimeline[q].push({ gate:'INIT', active:isActive, step:idx });
    }
  });

  const rows = qubits.map(q => {
    const gates = gateTimeline[q];
    const gateBoxes = gates.map(g => {
      let label = g.gate, cls = `gate-${g.gate.split('-')[0]}`;
      if (g.gate === 'CNOT-C') { label = '●'; cls = 'gate-CNOT'; }
      if (g.gate === 'CNOT-T') { label = '⊕'; cls = 'gate-CNOT'; }
      if (g.gate === 'MEASURE') label = 'M';
      if (g.gate === 'INIT') label = '|0⟩';
      return `<div class="wire-line" style="width:20px;min-width:20px"></div>
              <div class="gate-box ${cls} ${g.active?'active':''}">${label}</div>`;
    }).join('');

    const q_state = state.qubits[q];
    let stateStr = q_state.measured ? `|${q_state.value}⟩` : (q_state.superposition ? '|+⟩' : `|${q_state.value}⟩`);

    return `<div class="circuit-row">
      <div class="qubit-label">${q}</div>
      <div class="circuit-wire">
        <div class="wire-line" style="width:10px;min-width:10px"></div>
        ${gateBoxes}
        <div class="wire-line" style="flex:1"></div>
      </div>
      <div style="width:40px;text-align:right;font-size:12px;font-family:var(--font-mono);color:var(--text3);">${stateStr}</div>
    </div>`;
  });

  container.innerHTML = `<div class="circuit-viz">${rows.join('')}</div>`;
}

function renderStatePanel(state, container) {
  const qubits = Object.values(state.qubits);
  if (qubits.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="empty-text">No qubits</div></div>';
    return;
  }

  const cards = qubits.map(q => {
    const stateStr = q.measured ? `|${q.value}⟩` : (q.superposition ? `|+⟩` : `|${q.value}⟩`);
    const tags = [];
    if (q.superposition) tags.push(`<span class="qubit-tag tag-super">SUPERPOSITION</span>`);
    if (q.entangledWith) tags.push(`<span class="qubit-tag tag-entangled">⊗ ${q.entangledWith}</span>`);
    if (q.measured) tags.push(`<span class="qubit-tag tag-measured">MEASURED</span>`);

    let cls = 'qubit-card';
    if (q.measured) cls += ' measured';
    else if (q.entangledWith) cls += ' entangled';
    // mark last affected
    const lastResult = allStepResults[currentStepIdx];
    if (lastResult && lastResult.effect) {
      const e = lastResult.effect;
      if ((e.qubit === q.name) || (e.control === q.name) || (e.target === q.name)) cls += ' active';
    }

    return `<div class="${cls}">
      <div class="qubit-name">${q.name} ${q.owner ? '· '+q.owner : ''}</div>
      <div class="qubit-state-display">${stateStr}</div>
      <div class="qubit-meta">
        value: ${q.value} &nbsp;|&nbsp; basis: ${q.basis || '-'}
      </div>
      <div>${tags.join(' ')}</div>
    </div>`;
  });

  // Measurements section
  const meas = Object.entries(state.measurements);
  const measSection = meas.length > 0 ? `
    <div style="margin-top:16px">
      <div class="section-label" style="margin-bottom:8px">// Measurement Results</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${meas.map(([k,v]) => `
          <div style="padding:6px 14px;background:var(--bg3);border:1px solid var(--accent3);border-radius:6px;font-family:var(--font-mono);font-size:12px">
            <span style="color:var(--text3)">${k}:</span> <span style="color:var(--accent3);font-weight:700">|${v}⟩</span>
          </div>
        `).join('')}
      </div>
    </div>` : '';

  container.innerHTML = `<div class="state-grid">${cards.join('')}</div>${measSection}`;
}

function renderProtocolPanel(state, container) {
  const actors = Object.keys(state.actors);
  const channel = state.channel;

  if (actors.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="empty-text">No protocol actors declared</div></div>';
    return;
  }

  const actorIcons = { Alice:'👩', Bob:'👨', Eve:'🕵️' };
  const actorNodes = actors.map(a => {
    const icon = actorIcons[a] || '👤';
    const cls = `actor-${a}`;
    const lastResult = allStepResults[currentStepIdx];
    const isActive = lastResult && lastResult.effect &&
      (lastResult.effect.actor === a || lastResult.effect.from === a ||
       lastResult.effect.to === a || lastResult.effect.interceptor === a);
    return `<div class="actor-node">
      <div class="actor-avatar ${cls} ${isActive?'active':''}">${icon}</div>
      <div class="actor-name" style="color:${a==='Eve'?'var(--danger)':a==='Alice'?'var(--accent3)':'var(--accent)'}">${a}</div>
    </div>`;
  });

  const msgs = channel.map((m, i) => {
    const cls = m.intercepted ? 'intercepted' : '';
    const label = m.intercepted ? `🕵️ ${m.from} intercepted ${m.qubit}` : `📡 ${m.from} → ${m.to}: ${m.qubit}`;
    return `<div class="channel-msg ${cls}">
      <span>${label}</span>
    </div>`;
  });

  container.innerHTML = `
    <div class="protocol-flow">
      <div class="protocol-actors">${actorNodes.join('')}</div>
      <div class="channel-area">
        <div class="channel-line"></div>
        <div class="channel-label">Quantum Channel</div>
      </div>
      ${msgs.length > 0 ? `
        <div style="margin-top:8px">
          <div class="section-label" style="margin-bottom:6px">// Channel Events</div>
          <div class="channel-msgs">${msgs.join('')}</div>
        </div>` : ''}
    </div>`;
}

// ═══════════════════════════════════════════════
// BB84 SIMULATION (Statistical)
// ═══════════════════════════════════════════════
function runBB84Sim() {
  // Run the pseudo-code simulation
  allStepResults = controller.runAll();
  currentStepIdx = allStepResults.length - 1;

  // Also run statistical BB84 simulation
  bb84SimData = runStatBB84(16, eveActive);
  renderBB84Viz();
  renderLog();
  updateProgressBadge();
}

function updateProgressBadge() {
  const prog = controller.getProgress();
  document.getElementById('step-badge').textContent = `Step ${prog.done} / ${prog.total}`;
  document.getElementById('progress-fill').style.width = prog.percent + '%';
}

function runStatBB84(numBits, withEve) {
  const bases = ['Z','X'];
  const results = [];
  for (let i = 0; i < numBits; i++) {
    const ab = bases[Math.floor(Math.random()*2)];
    const av = Math.random() < 0.5 ? 0 : 1;
    const bb = bases[Math.floor(Math.random()*2)];
    let tv = av, eb = null;
    if (withEve) {
      eb = bases[Math.floor(Math.random()*2)];
      if (eb !== ab) tv = Math.random() < 0.5 ? 0 : 1;
    }
    let bv = (bb === ab) ? tv : (Math.random()<0.5?0:1);
    const match = ab === bb;
    const err = match && (av !== bv);
    results.push({ bit:i, aliceBasis:ab, aliceValue:av, eveBasis:eb, eveIntercept:withEve, bobBasis:bb, bobValue:bv, basesMatch:match, error:err });
  }
  const matching = results.filter(r=>r.basesMatch);
  const errors = matching.filter(r=>r.error);
  const errorRate = matching.length > 0 ? ((errors.length/matching.length)*100).toFixed(1) : '0.0';
  const sharedKey = matching.filter(r=>!r.error).map(r=>r.aliceValue);
  return { results, matching:matching.length, errors:errors.length, errorRate:parseFloat(errorRate), sharedKey, eveDetected: parseFloat(errorRate) > 11 };
}

function renderBB84Viz() {
  if (!bb84SimData) return;
  const d = bb84SimData;
  const container = document.getElementById('viz-content');

  const eveToggle = `
    <div class="eve-toggle">
      <div class="toggle-switch ${eveActive?'on':''}" onclick="toggleEve()">
        <div class="toggle-knob"></div>
      </div>
      <div>
        <div class="toggle-label" style="color:${eveActive?'var(--danger)':'var(--text2)'}">🕵️ Eve Active: ${eveActive?'YES':'NO'}</div>
        <div class="toggle-desc">Toggle Eve's eavesdropping attack</div>
      </div>
    </div>`;

  const alert = d.eveDetected
    ? `<div class="alert alert-danger">⚠️ EAVESDROPPING DETECTED — Error rate ${d.errorRate}% exceeds 11% threshold. Key exchange aborted.</div>`
    : `<div class="alert alert-success">✅ Channel appears SECURE — Error rate ${d.errorRate}% is within acceptable bounds.</div>`;

  const stats = `
    <div class="bb84-stats">
      <div class="stat-card stat-info"><div class="stat-value">${d.results.length}</div><div class="stat-label">Bits Sent</div></div>
      <div class="stat-card stat-success"><div class="stat-value">${d.matching}</div><div class="stat-label">Matching Bases</div></div>
      <div class="stat-card stat-danger"><div class="stat-value">${d.errors}</div><div class="stat-label">Errors</div></div>
      <div class="stat-card ${d.errorRate > 11 ? 'stat-danger' : 'stat-success'}"><div class="stat-value">${d.errorRate}%</div><div class="stat-label">Error Rate</div></div>
    </div>`;

  const keyBits = d.sharedKey.map(b =>
    `<span class="${b===0?'key-bit-0':'key-bit-1'}">${b}</span>`).join('');
  const keySection = `
    <div style="margin-top:12px">
      <div class="section-label" style="margin-bottom:6px">// Shared Key (${d.sharedKey.length} bits)</div>
      <div class="key-display">${keyBits || '<span style="color:var(--text3)">No key — too many errors</span>'}</div>
    </div>`;

  const tableRows = d.results.map(r => {
    const cls = r.basesMatch ? (r.error ? 'error-row' : 'match') : '';
    const eveTd = r.eveIntercept
      ? `<td class="eve-col ${r.eveBasis!==r.aliceBasis?'':''}">
          ${r.eveBasis} ${r.eveBasis!==r.aliceBasis?'⚠':' '}</td>`
      : `<td style="color:var(--text3)">—</td>`;
    return `<tr class="${cls}">
      <td style="color:var(--text3)">${r.bit}</td>
      <td class="basis-${r.aliceBasis}">${r.aliceBasis}</td>
      <td style="color:var(--text)">${r.aliceValue}</td>
      ${eveTd}
      <td class="basis-${r.bobBasis}">${r.bobBasis}</td>
      <td style="color:var(--text)">${r.bobValue}</td>
      <td>${r.basesMatch?'<span style="color:var(--accent3)">✓</span>':'<span style="color:var(--text3)">✗</span>'}</td>
      <td>${r.error?'<span style="color:var(--danger)">ERR</span>':'<span style="color:var(--text3)">-</span>'}</td>
    </tr>`;
  }).join('');

  const table = `
    <div style="margin-top:12px;overflow-x:auto">
      <div class="section-label" style="margin-bottom:6px">// Bit-by-bit Analysis</div>
      <table class="bb84-table">
        <thead>
          <tr>
            <th>#</th><th>Alice Basis</th><th>Alice Val</th>
            <th>Eve Basis</th>
            <th>Bob Basis</th><th>Bob Val</th><th>Match</th><th>Error</th>
          </tr>
        </thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>`;

  const rerunBtn = `<div style="margin-top:12px">
    <button class="btn btn-step" onclick="rerunBB84()" style="width:auto;padding:8px 20px">
      🔄 Re-run Simulation
    </button>
  </div>`;

  container.innerHTML = eveToggle + alert + stats + keySection + table + rerunBtn;
  document.getElementById('log-badge').textContent = `${allStepResults.length} events`;
}

function toggleEve() {
  eveActive = !eveActive;
  bb84SimData = runStatBB84(16, eveActive);
  renderBB84Viz();
}

function rerunBB84() {
  bb84SimData = runStatBB84(16, eveActive);
  renderBB84Viz();
}

// ═══════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════
initApp();
</script>
